services:
  - type: web
    name: mediflow-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: mediflow-backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
        value: "http://localhost:5173,https://*.vercel.app,https://mediflow.vercel.app"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
