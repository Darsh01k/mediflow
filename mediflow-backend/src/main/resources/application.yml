server:
  port: ${PORT:8080}

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    out-of-order: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-secret}
            scope:
              - email
              - profile
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mediflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

mediflow:
  ratelimit:
    requests-per-minute: 20
    auth-endpoints-enabled: true
  jwt:
    # 256-bit secret key in Hex (must be at least 32 bytes)
    secret: ${JWT_SECRET:bWVkaWZsb3ctc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tc2VjdXJlLTI1Ni1iaXQ=}
    # Expiration time: 24 hours (86400000 milliseconds)
    expiration-ms: 86400000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,https://*.vercel.app,https://mediflow.vercel.app}
